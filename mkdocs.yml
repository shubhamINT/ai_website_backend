site_name: AGUI Backend Docs
site_description: Architecture, data flows, and tools reference for the AGUI voice agent backend.
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.tooltips
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Auth System: auth.md
  - Data Flows: data-flows.md
  - Tools Reference: tools.md

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - admonition
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
